<div class="form-container">

  <h2>Ajouter une suggestion</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">

    <!-- Titre -->
    <div class="form-group">
      <label>Titre</label>
      <input type="text" formControlName="title">

      <small *ngIf="form.get('title')?.invalid && form.get('title')?.touched">
        Le titre doit commencer par une majuscule et contenir au moins 5 lettres
      </small>
    </div>

    <!-- Description -->
    <div class="form-group">
      <label>Description</label>
      <textarea formControlName="description"></textarea>

      <small *ngIf="form.get('description')?.invalid && form.get('description')?.touched">
        Minimum 30 caractères requis
      </small>
    </div>

    <!-- Catégorie -->
    <div class="form-group">
      <label>Catégorie</label>
      <select formControlName="category">
        <option value="">-- Sélectionnez une catégorie --</option>
        <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
      </select>

      <small *ngIf="form.get('category')?.invalid && form.get('category')?.touched">
        Catégorie obligatoire
      </small>
    </div>

    <!-- Date -->
    <div class="form-group">
      <label>Date</label>
      <input formControlName="date" readonly>
    </div>

    <!-- Status -->
    <div class="form-group">
      <label>Status</label>
      <input formControlName="status" readonly>
    </div>

    <!-- Bouton -->
    <button type="submit" [disabled]="form.invalid">
      Soumettre
    </button>

  </form>

</div>
